[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short tracebacks, verbose output
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=routes
    --cov=models
    --cov-report=term-missing
    --cov-report=html:tests/coverage_html

# Suppress SQLAlchemy deprecation warnings in test output
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy
    ignore::DeprecationWarning:flask_sqlalchemy
